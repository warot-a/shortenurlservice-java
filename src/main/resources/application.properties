spring.application.name=shorturlservice

## MongoDB Settings
## Local dev: defaults to Docker MongoDB on localhost:27017
## Cloud (Atlas): set MONGODB_URI env var to your Atlas connection string
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/short_url_db}

## Redis Settings
spring.data.redis.host=localhost
spring.data.redis.port=16379

## URL Shortener Settings
app.domain.base-url=http://localhost:8080

# Swagger UI Settings (Disabled by default)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
